---
# restores a device config from backup
# usage: ansible-playbook playbooks/rollback.yml --limit rtr-core-01
#        -e "backup_file=backups/rtr-core-01/2024-01-15/rtr-core-01_1705305600.cfg"

- name: rollback device config
  hosts: "{{ target | default('network_devices') }}"
  gather_facts: false

  tasks:
    - name: confirm rollback
      pause:
        prompt: |
          WARNING: rolling back {{ inventory_hostname }}
          file: {{ backup_file }}
          type 'yes' to continue
      register: confirm
      delegate_to: localhost

    - name: abort if not confirmed
      fail:
        msg: "rollback cancelled"
      when: confirm.user_input != 'yes'

    - name: apply backup config
      ios_config:
        src: "{{ backup_file }}"

    - name: save
      ios_command:
        commands:
          - write memory

    - name: log the rollback
      lineinfile:
        path: logs/rollback.log
        line: "{{ ansible_date_time.iso8601 }} | {{ inventory_hostname }} | rolled back from {{ backup_file }}"
        create: yes
      delegate_to: localhost
