---
# full pipeline: audit -> harden -> verify -> report
#
# usage:
#   full run    : ansible-playbook playbooks/site.yml
#   dry run     : ansible-playbook playbooks/site.yml -e "hardening_check_only=true"
#   single host : ansible-playbook playbooks/site.yml --limit rtr-core-01
#   single tag  : ansible-playbook playbooks/site.yml --tags ssh

- name: Pre-hardening audit
  hosts: network_devices
  gather_facts: false
  serial: 5
  roles:
    - auditing

- name: Apply hardening
  hosts: network_devices
  gather_facts: false
  serial: 3
  roles:
    - hardening

- name: Post-hardening verification
  hosts: network_devices
  gather_facts: false
  serial: 5
  roles:
    - role: auditing
      vars:
        auditing_results_dir: "reports/post_hardening"

- name: Generate report
  hosts: localhost
  gather_facts: true
  roles:
    - reporting
