---
# read-only compliance scan, no changes made
# safe to run anytime
# usage: ansible-playbook playbooks/audit_only.yml

- name: audit all devices
  hosts: network_devices
  gather_facts: false
  serial: 10
  pre_tasks:
    - name: create results dir
      file:
        path: reports/audit_results
        state: directory
      delegate_to: localhost
      run_once: true
  roles:
    - auditing

- name: generate report
  hosts: localhost
  gather_facts: true
  roles:
    - reporting
