---
- name: generate rsa key
  ios_command:
    commands:
      - "crypto key generate rsa modulus {{ ssh_bits }}"
  when: not check_only | bool
  tags: ssh

- name: lock down to sshv2
  ios_config:
    lines:
      - "ip ssh version 2"
  when: not check_only | bool
  tags: ssh

- name: set timeouts
  ios_config:
    lines:
      - "ip ssh time-out {{ ssh_timeout }}"
      - "ip ssh authentication-retries {{ ssh_retries }}"
  when: not check_only | bool
  tags: ssh

- name: vty lines ssh only, no telnet
  ios_config:
    parents: "line vty 0 15"
    lines:
      - "transport input ssh"
      - "transport output none"
      - "exec-timeout 10 0"
      - "logging synchronous"
      - "login authentication default"
  when: not check_only | bool
  tags: ssh

- name: console line
  ios_config:
    parents: "line con 0"
    lines:
      - "exec-timeout 10 0"
      - "logging synchronous"
  when: not check_only | bool
  tags: ssh

# aux is rarely used but lock it anyway
- name: lock aux port
  ios_config:
    parents: "line aux 0"
    lines:
      - "transport input none"
      - "no exec"
      - "exec-timeout 0 1"
  when: not check_only | bool
  tags: ssh
