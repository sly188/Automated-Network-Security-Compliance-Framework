---
- name: enable aaa
  ios_config:
    lines:
      - "aaa new-model"
  when: not check_only | bool
  tags: aaa

- name: add tacacs servers
  ios_config:
    lines:
      - "tacacs server {{ 'TACACS-' + (item.host | replace('.', '-')) }}"
      - " address ipv4 {{ item.host }}"
      - " key {{ tacacs_key }}"
      - " timeout {{ item.timeout }}"
  loop: "{{ tacacs_hosts }}"
  no_log: true
  when: not check_only | bool
  tags: aaa

- name: tacacs server group
  ios_config:
    lines:
      - "aaa group server tacacs+ TACACS-GROUP"
      - " server name {{ 'TACACS-' + (item.host | replace('.', '-')) }}"
  loop: "{{ tacacs_hosts }}"
  when: not check_only | bool
  tags: aaa

- name: authentication policies
  ios_config:
    lines:
      - "aaa authentication login default group tacacs+ local"
      - "aaa authentication enable default group tacacs+ enable"
      - "aaa authentication login CONSOLE local"
  when: not check_only | bool
  tags: aaa

- name: authorization policies
  ios_config:
    lines:
      - "aaa authorization exec default group tacacs+ local"
      - "aaa authorization commands 15 default group tacacs+ local"
      - "aaa authorization config-commands"
  when: not check_only | bool
  tags: aaa

- name: accounting
  ios_config:
    lines:
      - "aaa accounting exec default start-stop group tacacs+"
      - "aaa accounting commands 15 default start-stop group tacacs+"
  when: not check_only | bool
  tags: aaa

# console falls back to local if tacacs is down
- name: console uses local auth as fallback
  ios_config:
    parents: "line con 0"
    lines:
      - "login authentication CONSOLE"
  when: not check_only | bool
  tags: aaa
